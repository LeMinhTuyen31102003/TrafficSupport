name = "traffic-support-chat"
main = "gemini-chat-worker.js"
compatibility_date = "2026-06-17"

[vars]
GEMINI_MODEL = "gemini-3.5-flash"
GEMINI_FALLBACK_MODELS = "gemini-2.5-flash"
GEMINI_TIMEOUT_MS = "60000"
MAX_CONTEXT_CHARS = "12000"
# Replace this with your real website origin before deploying.
# Use comma-separated origins if needed, for example:
# ALLOWED_ORIGIN = "https://example.com,http://localhost:5500"
ALLOWED_ORIGIN = "https://trafficsupport.pages.dev,http://localhost:5500"
